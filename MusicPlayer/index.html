<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple HTML5 Music Player with Canvas Visualization" />
    <meta name="keywords" content="music, player, html5, canvas, audio" />
    <title>Musics Submission</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Musics Submission</h1>
        <p>Experience music with visual vibes</p>
    </header>

    <!-- SECTION 1: User Registration Form -->
    <article id="registration-view" class="container">
        <section class="form-box">
            <h2>User Registration</h2>
            <form id="userForm">
                <!-- User Details -->
                <div class="input-group">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" required placeholder="Enter First Name" />
                </div>

                <div class="input-group">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" required placeholder="Enter Last Name" />
                </div>

                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="text" id="email" required placeholder="Enter email"/>
                </div>

                <div class="input-group">
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob" required />
                </div>

                <div class="input-group">
                    <label>Gender:</label>
                    <div class="radio-group">
                        <input type="radio" id="male" name="gender" value="Male" required />
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="Female" />
                        <label for="female">Female</label>
                    </div>
                </div>

                <div class="input-group">
                    <label for="musicType">Music Type:</label>
                    <select id="musicType">
                        <option value="Pop">Pop</option>
                        <option value="Rock">Rock</option>
                        <option value="Jazz">Jazz</option>
                        <option value="Classical">Classical</option>
                    </select>
                </div>

                <!-- Music File Upload -->
                <div class="input-group">
                    <label for="musicFiles">Upload Music (MP3):</label>
                    <input type="file" id="musicFiles" accept="audio/mp3,audio/*" multiple required />
                    <small>Select multiple files to create a playlist.</small>
                </div>

                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </section>
    </article>

    <!-- SECTION 2: Music Player -->
    <article id="player-view" class="player-container hidden">
        <div class="welcome-banner">
            <h2 id="welcomeUser">Welcome, User!</h2>
        </div>

        <div class="visualizer-area">
            <canvas id="audioVisualizer" width="600" height="200"></canvas>
            <div class="controls-overlay">
                <div class="song-info">
                    <h2 id="songTitle">Select a Song</h2>
                    <p id="artistName">Artist Unknown</p>
                </div>
            </div>
        </div>

        <section class="controls">
            <!-- Media Tag: Audio -->
            <audio id="mainAudio" controls="controls">
                Your browser does not support the audio element.
            </audio>
            
            <div class="playlist">
                <h3>Your Playlist</h3>
                <ul id="playlistItems">
                    <!-- Playlist generated by JS -->
                </ul>
            </div>
            
            <button id="backBtn" class="btn-secondary">Back to Registration</button>
        </section>
    </article>

    <footer>
        <p>&copy; 2024 Music Player. Design by Jeet Patel-24CP423.</p>
        <p>Powered by HTML5 &lt;audio&gt; and &lt;canvas&gt;</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
